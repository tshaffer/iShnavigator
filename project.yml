name: tsShnavigator
options:
  bundleIdPrefix: com.tedshaffer
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.2"

settings:
  base:
    SWIFT_VERSION: "5.10"
    ENABLE_PREVIEWS: YES

targets:
  tsShnavigator:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - iShnavigator
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tedshaffer.tsShnavigator
        PRODUCT_NAME: tsShnavigator
        INFOPLIST_FILE: iShnavigator/Info.plist
        SWIFT_VERSION: "5.10"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
